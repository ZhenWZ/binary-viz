name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20.18.3'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: npx vite build

      - name: Build standalone server
        run: |
          cat > /tmp/standalone.ts << 'SERVEREOF'
          import express from "express";
          import { createServer } from "http";
          import path from "path";
          async function startServer() {
            const app = express();
            const server = createServer(app);
            const staticPath = path.resolve(__dirname, "public");
            app.use(express.static(staticPath));
            app.get("/{*splat}", (_req, res) => {
              res.sendFile(path.join(staticPath, "index.html"));
            });
            const port = process.env.PORT || 3000;
            server.listen(port, () => {
              console.log(`Binary Data Visualizer running at http://localhost:${port}/`);
            });
          }
          startServer().catch(console.error);
          SERVEREOF
          npx esbuild /tmp/standalone.ts --platform=node --bundle --format=cjs --outfile=dist/server.cjs

      - name: Determine version
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Download Node.js binaries for self-contained builds
      - name: Download Node.js linux-x64
        run: |
          curl -fsSL "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-linux-x64.tar.xz" -o node-linux.tar.xz
          mkdir -p node-linux
          tar -xf node-linux.tar.xz --strip-components=1 -C node-linux

      - name: Download Node.js win-x64
        run: |
          curl -fsSL "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip" -o node-win.zip
          mkdir -p node-win
          unzip -q node-win.zip -d node-win-tmp
          mv node-win-tmp/node-v${{ env.NODE_VERSION }}-win-x64/* node-win/
          rm -rf node-win-tmp

      # Package Linux self-contained build
      - name: Package Linux build
        run: |
          mkdir -p binary-viz-linux
          cp dist/server.cjs binary-viz-linux/
          cp -r dist/public binary-viz-linux/public
          cp node-linux/bin/node binary-viz-linux/node
          printf '#!/bin/sh\ncd "$(dirname "$0")"\nPORT="${PORT:-3000}" ./node server.cjs\n' > binary-viz-linux/start.sh
          chmod +x binary-viz-linux/start.sh binary-viz-linux/node
          tar -czf binary-viz-${{ steps.version.outputs.tag }}-linux-x64.tar.gz -C binary-viz-linux .

      # Package Windows self-contained build
      - name: Package Windows build
        run: |
          mkdir -p binary-viz-win
          cp dist/server.cjs binary-viz-win/
          cp -r dist/public binary-viz-win/public
          cp node-win/node.exe binary-viz-win/node.exe
          printf '@echo off\r\ncd /d "%%~dp0"\r\nif "%%PORT%%"=="" set PORT=3000\r\necho Starting Binary Data Visualizer on http://localhost:%%PORT%%/\r\nnode.exe server.cjs\r\n' > binary-viz-win/start.bat
          cd binary-viz-win && zip -rq ../binary-viz-${{ steps.version.outputs.tag }}-win-x64.zip . && cd ..

      # Package lightweight build (requires Node.js on the machine)
      - name: Package portable build
        run: |
          mkdir -p binary-viz-light
          cp dist/server.cjs binary-viz-light/
          cp -r dist/public binary-viz-light/public
          tar -czf binary-viz-${{ steps.version.outputs.tag }}-portable.tar.gz -C binary-viz-light .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            binary-viz-${{ steps.version.outputs.tag }}-linux-x64.tar.gz
            binary-viz-${{ steps.version.outputs.tag }}-win-x64.zip
            binary-viz-${{ steps.version.outputs.tag }}-portable.tar.gz

      # Docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
