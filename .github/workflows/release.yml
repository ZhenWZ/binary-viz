name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20.18.3'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build standalone
        run: pnpm build:standalone

      - name: Determine version
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Download Node.js binaries for self-contained builds
      - name: Download Node.js linux-x64
        run: |
          curl -fsSL "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-linux-x64.tar.xz" -o node-linux.tar.xz
          mkdir -p node-linux
          tar -xf node-linux.tar.xz --strip-components=1 -C node-linux

      - name: Download Node.js win-x64
        run: |
          curl -fsSL "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip" -o node-win.zip
          mkdir -p node-win
          unzip -q node-win.zip -d node-win-tmp
          mv node-win-tmp/node-v${{ env.NODE_VERSION }}-win-x64/* node-win/
          rm -rf node-win-tmp

      # Package Linux self-contained build
      - name: Package Linux build
        run: |
          mkdir -p binary-viz-linux
          cp dist/server.cjs binary-viz-linux/
          cp -r dist/public binary-viz-linux/public
          cp node-linux/bin/node binary-viz-linux/node
          cat > binary-viz-linux/start.sh << 'SCRIPT'
          #!/bin/sh
          cd "$(dirname "$0")"
          PORT="${PORT:-3000}" ./node server.cjs
          SCRIPT
          chmod +x binary-viz-linux/start.sh binary-viz-linux/node
          tar -czf binary-viz-${{ steps.version.outputs.tag }}-linux-x64.tar.gz -C binary-viz-linux .

      # Package Windows self-contained build
      - name: Package Windows build
        run: |
          mkdir -p binary-viz-win
          cp dist/server.cjs binary-viz-win/
          cp -r dist/public binary-viz-win/public
          cp node-win/node.exe binary-viz-win/node.exe
          cat > binary-viz-win/start.bat << 'SCRIPT'
          @echo off
          cd /d "%~dp0"
          set PORT=%PORT%
          if "%PORT%"=="" set PORT=3000
          echo Starting Binary Data Visualizer on http://localhost:%PORT%/
          node.exe server.cjs
          SCRIPT
          cd binary-viz-win && zip -rq ../binary-viz-${{ steps.version.outputs.tag }}-win-x64.zip . && cd ..

      # Package lightweight build (requires Node.js on the machine)
      - name: Package lightweight build
        run: |
          mkdir -p binary-viz-light
          cp dist/server.cjs binary-viz-light/
          cp -r dist/public binary-viz-light/public
          tar -czf binary-viz-${{ steps.version.outputs.tag }}-portable.tar.gz -C binary-viz-light .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            binary-viz-${{ steps.version.outputs.tag }}-linux-x64.tar.gz
            binary-viz-${{ steps.version.outputs.tag }}-win-x64.zip
            binary-viz-${{ steps.version.outputs.tag }}-portable.tar.gz

      # Docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
